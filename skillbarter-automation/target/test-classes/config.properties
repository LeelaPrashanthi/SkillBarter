# ============================================================
#  SkillBarter Automation – Main Configuration
#  Environment : Production (Vercel)
# ============================================================

# ── Application URL ──────────────────────────────────────────
base.url=https://skill-barter-wine-theta.vercel.app/

# ── Browser Config ───────────────────────────────────────────
# Options: chrome | firefox | edge
browser=chrome
headless=false

# ── Test Credentials (replace with valid seeded test account) ──
valid.email=validuser@test.com
valid.password=Valid@123

# ── Timeouts (seconds) ───────────────────────────────────────
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# ── Paths ────────────────────────────────────────────────────
reports.path=test-output/reports/ExtentReport.html
screenshots.path=test-output/screenshots/
testdata.path=src/test/resources/testdata/TestData.xlsx
